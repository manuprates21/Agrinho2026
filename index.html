<!DOCTYPE html>
<html lang= "pt-BR">
    <head>
        <Meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">    
        <title>TEC-AGROCAMP</title>
        <style>
            body { margin: 0; font-family: Arial, Helvetica, sans-serif;}
            .banner { position: relative;
                    background-image: url(banner-campo.jpg);
                   background-size: cover;
                   background-position: center;
                   height: 300px;
                   display: flex;
                 align-items: center;
                 justify-content: center;
        }
        .banner h1{
            color: white;
            font-size: 48px;
            text-shadow: 2px 2px 4px black;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px 40px;
            border-radius: 10px;
        }
        nav{
            background: #2d5016;
            padding: 15px;
            text-align: center;
        }
        nav button {
            background: white;
            color: #2d5016;
            border: none;
            padding: 12px 25px;
            margin: 0 8px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
        }
        </style>
       
     </body>
</html>
