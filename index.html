<!DOCTYPE html>
<html lang= "pt-BR">
    <head>
        <Meta charset="utf-8"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">    
        <title>TEC-AGROCAMP</title>
    <style>
        body{ margin: 0; font-size: arial sans-serif; background: #f5f5f5; }
        header{background: #2d5016; color: white; text-align: center; padding: 25px; }
        header h1 { margin: 0; font-size: 32px; }
        nav{background:#2d5016; display: flex; justify-content: center; }
        nav button { background: transparent; color: white; border: none; padding: 15px 25px; font-size: 16px; font-weight: bold; cursor: pointer; }
        main{ max-width: 1100px; margin: 20px auto; background: white; border-radius: 8px; min-height: 600px; }
        iframe{ width: 100%; height: 700px; border: none; border-radius: 8px;}
    </style>
    </head>
    <body>
        <header><h1>TEC-AGROCAMP</h1></header>
        <nav>
            <button
            onclick="trocarAba('inicio')" class="ativo">inicio</button>
            <button
            onclick="TrocarAba('importancia')">importancia</button>
            <button 
            onclick="trocarAba('produtos')">produtos</button>
            <button
            onclick="trocarAba('porque')">porque</button>
            <button
            onclick="trocarAba('galeria')">galeria</button>
        </nav>
        <script>
            function trocarAba(pasta) { document.getElementById('tela').src=pasta + '/index.html';
                document.querySelectorAll('nav button').forEach(b=> b.classList.remove('ativo'));
                event.currentTarget.classList.add('ativo');
            }
        </script>
    </body>
</html>
